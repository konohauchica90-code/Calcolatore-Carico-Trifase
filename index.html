<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricerca Tecnica</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4 text-blue-600">Inserimento Dati</h2>
        
        <div class="space-y-4">
            <div><label>Vconcatenata [V]</label><input id="vconc" type="number" class="w-full border p-2 rounded"></div>
            <div><label>Rfase-neutro [Ω]</label><input id="rfase" type="number" step="0.01" class="w-full border p-2 rounded"></div>
            <div><label>Req [Ω]</label><input id="req" type="number" step="0.01" class="w-full border p-2 rounded"></div>
            <div><label>Ptot [kW]</label><input id="ptot" type="number" step="0.1" class="w-full border p-2 rounded"></div>
            
            <button onclick="cerca()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">CERCA</button>
        </div>

        <div id="risultati" class="mt-6 space-y-2 hidden">
            <h3 class="font-bold border-b pb-2">Risultati:</h3>
            <div id="cont_prev" class="text-sm text-gray-500 p-2 bg-gray-50 rounded"></div>
            <div id="cont_target" class="text-md font-bold p-2 bg-yellow-100 border-l-4 border-yellow-500 rounded"></div>
            <div id="cont_next" class="text-sm text-gray-500 p-2 bg-gray-50 rounded"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "INSERISCI_QUI_URL_DEPLOYMENT";

        async function cerca() {
            const params = new URLSearchParams({
                vconc: document.getElementById('vconc').value,
                rfase: document.getElementById('rfase').value,
                req: document.getElementById('req').value,
                ptot: document.getElementById('ptot').value
            });

            const res = await fetch(`${SCRIPT_URL}?${params}`);
            const data = await res.json();
            
            if(data.found) {
                document.getElementById('risultati').classList.remove('hidden');
                document.getElementById('cont_prev').innerText = "Sopra: " + (data.prev || "Nessuno");
                document.getElementById('cont_target').innerText = "Trovato: " + data.target;
                document.getElementById('cont_next').innerText = "Sotto: " + (data.next || "Nessuno");
            } else {
                alert("Nessuna corrispondenza trovata.");
            }
        }
    </script>
</body>
</html>
